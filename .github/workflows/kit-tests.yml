# HOST-OWNED companion to substrate-gate. The gate workflow is
# KIT-OWNED (adopt/upgrade regenerates it; hand edits are overwritten
# and its header says host customizations belong in a SEPARATE file) —
# so the candidate test suites run here instead.
# Purpose: make "real-path HTTP-layer tests GREEN in CI" a named,
# enforced check — runs the membership-kit server suites, including
# the ORDER 003 real-path HTTP tests (test_http_realpath), which start
# the actual app.py server and drive signed Stripe fixture payloads
# over real HTTP. Stdlib-only, no external deps. unittest exits
# nonzero on any failure, so a failing test reds this check.
# (template-packs ships no test suite at HEAD; add it here when one
# exists.)
name: kit-tests
on:
  pull_request:
  push:
    branches: [main]
jobs:
  membership-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: membership-kit server tests (unit + ORDER 003 real-path HTTP + SupabaseStore)
        working-directory: candidates/membership-kit/server
        run: python3 -m unittest test_membership test_http_realpath test_supabase_store -v
  stripe-webhook-test-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: stripe-webhook-test-kit real-path HTTP tests
        working-directory: candidates/stripe-webhook-test-kit
        run: python3 -m unittest test_http_realpath -v
  github-webhook-test-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: github-webhook-test-kit real-path HTTP tests
        working-directory: candidates/github-webhook-test-kit
        run: python3 -m unittest test_http_realpath -v
  slack-webhook-test-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: slack-webhook-test-kit real-path HTTP tests
        working-directory: candidates/slack-webhook-test-kit
        run: python3 -m unittest test_http_realpath -v
  shopify-webhook-test-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: shopify-webhook-test-kit real-path HTTP tests
        working-directory: candidates/shopify-webhook-test-kit
        run: python3 -m unittest test_http_realpath -v
  idempotency-key-test-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: idempotency-key-test-kit real-path HTTP tests
        working-directory: candidates/idempotency-key-test-kit
        run: python3 -m unittest test_http_realpath -v
  rate-limit-test-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: rate-limit-test-kit real-path HTTP tests
        working-directory: candidates/rate-limit-test-kit
        run: python3 -m unittest test_http_realpath -v
  pagination-test-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: pagination-test-kit real-path HTTP tests
        working-directory: candidates/pagination-test-kit
        run: python3 -m unittest test_http_realpath -v
  jwt-auth-test-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: jwt-auth-test-kit real-path HTTP tests
        working-directory: candidates/jwt-auth-test-kit
