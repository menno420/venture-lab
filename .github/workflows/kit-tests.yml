  owner-click-queue-kit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: owner-click-queue-kit parse/derive/lint tests
        working-directory: candidates/owner-click-queue-kit
        run: python3 -m unittest test_ocq -v
  catalog-dref-guard:
    # REQUIRED gate. Machine-catches the OWNER-QUEUE renumber-mispoint class
    # (PR #244 renumbered decision IDs and the bundle/catalog D-ref
    # cross-references silently mispointed; bootstrap --strict is semantic-blind
    # to cross-refs, so #244 shipped green and #245 hand-resynced). The checker
    # builds the live D-ID → SKU map from OWNER-QUEUE.md §1 and asserts every
    # allowlisted live cross-ref resolves + points at the right SKU; the unittest
    # adds a catch-case fixture proving the guard fires. Stdlib-only, system
    # python3. Contract + allowlist/exclusion scoping: the
    # scripts/check_catalog_drefs.py docstring.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: catalog D-ref guard (checker on the live tree)
        run: python3 scripts/check_catalog_drefs.py
      - name: catalog D-ref guard tests (pass-case on the tree + mispoint catch-case)
        working-directory: scripts
        run: python3 -m unittest test_check_catalog_drefs -v
  owner-queue-idempotence-guard:
    # REQUIRED gate (ENG-6). Pins the IDEMPOTENCE of the generated
    # docs/publishing/OWNER-QUEUE.md under scripts/derive_owner_queue.py: the
    # committed queue must be byte-identical to a fresh regeneration over its
    # current inputs (the §7 ⚑ OWNER-GATE blocks of docs/publishing/vetting/*.md
    # plus ⚑ OWNER conflicts in keyword-map.md). Machine-catches the class that
    # CAUSES a D-ref mispoint — a hand-edit to the generated file, or an input
    # packet drifting without a regen — which is upstream of the catalog-dref-guard
    # above (that one catches a mispoint AFTER a regen introduces it; this one
    # prevents the regen/hand-edit from silently introducing it, completing the
    # #244/#245 safety story). The guard drives derive_owner_queue's OWN parser +
    # render so it can never drift from the generator it guards; the unittest adds
    # hand-edit + input-drift catch-cases proving the guard fires. Stdlib-only,
    # system python3. Contract: the scripts/check_owner_queue_idempotent.py docstring.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: owner-queue idempotence guard (checker on the live tree)
        run: python3 scripts/check_owner_queue_idempotent.py
      - name: owner-queue idempotence guard tests (live-tree green + hand-edit/input-drift catch-cases)
        working-directory: scripts
        run: python3 -m unittest test_check_owner_queue_idempotent -v
  built-registered-guard:
    # REQUIRED gate (ENG-5). Guards the storefront INVENTORY-to-REGISTRY
    # correspondence: every packaged candidate (candidates/<sku>/dist/) must be
    # registered for launch (docs/launch/<sku>/), carry a vetting packet
    # (docs/publishing/vetting/<sku>.md), and appear in docs/launch/CATALOG.md;
    # and every launch row must have its build artifacts. Machine-catches two drift
    # classes that strand the owner's click path — a kit BUILT-BUT-UNREGISTERED (it
    # would never surface as an owner publish step) and a launch row
    # REGISTERED-BUT-MISSING-ARTIFACT (an owner click that dead-links). This sits one
    # level up from catalog-dref-guard / owner-queue-idempotence-guard (which guard
    # the generated queue's internal consistency): it guards the built ↔ registered
    # correspondence itself. Two deliberate exemptions (bundle-starter, a
    # compositional scaffold with no build dir; photo-packs, an owner-gated lane kept
    # out of the storefront catalog per CATALOG.md) are allowlisted with reasons; the
    # unittest adds built-but-unregistered + registered-but-missing catch-cases
    # proving the guard fires. Stdlib-only, system python3. Contract + the exemption
    # allowlists: the scripts/check_built_registered.py docstring.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: built-vs-registered guard (checker on the live tree)
        run: python3 scripts/check_built_registered.py
      - name: built-vs-registered guard tests (live-tree green + built-unregistered/missing-artifact catch-cases)
        working-directory: scripts
        run: python3 -m unittest test_check_built_registered -v
  owner-gate-lint-advisory:
    # ADVISORY ONLY — never a required gate. The step is
    # continue-on-error, so a red lint flags without blocking unrelated
    # work (same shape as ledger-drift-advisory below). It runs the
    # strict OCQK-ported linter over the packet §7 OWNER-GATE blocks +
    # keyword-map ⚑ OWNER conflicts and exits 1 on any malformed gate —
    # including date-SHAPED but impossible dates (month 13, day 32)
    # that the tolerant derive script accepts. Contract + checks:
    # the scripts/lint_owner_gates.py docstring.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: owner-gate lint advisory (stdlib-only, system python3)
        continue-on-error: true
        run: python3 scripts/lint_owner_gates.py
  ledger-drift-advisory:
    # ADVISORY ONLY — never a required gate. Double-guarded against
    # ever turning red: the script exits 0 on EVERY path (in-sync,
    # trailing, skip, parse failure) AND the step is continue-on-error.
    # It prints one ledger-drift line comparing docs/current-state.md
    # "Recently shipped" vs the newest merged PR. Contract + usage:
    # docs/ledger-drift-checker.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ledger drift advisory (stdlib-only, system python3)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check_ledger_drift.py
  funnel-coverage-advisory:
    # ADVISORY ONLY — never a required gate. Double-guarded against ever
    # turning red: the script exits 0 on EVERY path (covered, uncovered,
    # skip) AND the step is continue-on-error (same shape as
    # ledger-drift-advisory above). It reads docs/launch/CATALOG.md
    # §"Cross-sell clusters" and prints one line per cluster, warning
    # UNCOVERED on any cluster that carries a singles/bundle list but has
    # no linked *-lead-magnet.md funnel-top — the "which cluster is the
    # next magnet target" signal. The unittest adds an uncovered-fixture
    # catch-case proving the advisory fires. Contract + coverage model:
    # the scripts/check_funnel_coverage.py docstring.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: funnel-coverage advisory (stdlib-only, system python3)
        continue-on-error: true
        run: python3 scripts/check_funnel_coverage.py
      - name: funnel-coverage advisory tests (live-tree green + uncovered catch-case)
        continue-on-error: true
        working-directory: scripts
        run: python3 -m unittest test_check_funnel_coverage -v
